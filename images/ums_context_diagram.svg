<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 960 620" role="img">
  <title>UMS System Context Diagram</title>
  <desc>
    The University Management System and its human actors Students, Lecturers,
    Administrators, and Finance Staff, as well as the external systems SIS,
    FMS, and Email Service.
  </desc>

  <defs>
    <marker id="arrow-human" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 8 5 L 1 9" fill="none" stroke="#1d9e75"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-external" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 8 5 L 1 9" fill="none" stroke="#ba7517"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .system-box {
        fill: #3c3489;
        stroke: #afa9ec;
        stroke-width: 2;
      }
      .human-box {
        fill: #085041;
        stroke: #5dcaa5;
        stroke-width: 1.5;
      }
      .external-box {
        fill: #633806;
        stroke: #ef9f27;
        stroke-width: 1.5;
      }
      .system-title {
        fill: #cecbf6;
        font-size: 20px;
        font-weight: 600;
      }
      .system-subtitle {
        fill: #afa9ec;
        font-size: 15px;
      }
      .human-title {
        fill: #9fe1cb;
        font-size: 16px;
        font-weight: 600;
      }
      .external-title {
        fill: #fac775;
        font-size: 16px;
        font-weight: 600;
      }
      .external-subtitle {
        fill: #ef9f27;
        font-size: 13px;
      }
      .flow-label {
        fill: #5f5e5a;
        font-size: 13px;
      }
      .human-flow {
        fill: none;
        stroke: #1d9e75;
        stroke-width: 1.8;
        marker-end: url(#arrow-human);
      }
      .external-flow {
        fill: none;
        stroke: #ba7517;
        stroke-width: 1.8;
        stroke-dasharray: 7 5;
        marker-end: url(#arrow-external);
      }
      .legend {
        fill: #5f5e5a;
        font-size: 13px;
      }
    </style>
  </defs>

  <!-- Human actors -->
  <g>
    <rect class="human-box" x="35" y="35" width="170" height="58" rx="8"/>
    <text class="human-title" x="120" y="69" text-anchor="middle">Students</text>

    <rect class="human-box" x="755" y="35" width="170" height="58" rx="8"/>
    <text class="human-title" x="840" y="69" text-anchor="middle">Lecturers</text>

    <rect class="human-box" x="35" y="247" width="170" height="58" rx="8"/>
    <text class="human-title" x="120" y="281" text-anchor="middle">Administrators</text>

    <rect class="human-box" x="755" y="247" width="170" height="58" rx="8"/>
    <text class="human-title" x="840" y="281" text-anchor="middle">Finance Staff</text>
  </g>

  <!-- System boundary -->
  <g>
    <rect class="system-box" x="330" y="215" width="300" height="120" rx="12"/>
    <text class="system-title" x="480" y="265" text-anchor="middle">
      University Management
    </text>
    <text class="system-title" x="480" y="291" text-anchor="middle">
      System
    </text>
    <text class="system-subtitle" x="480" y="316" text-anchor="middle">(UMS)</text>
  </g>

  <!-- Human interactions -->
  <path class="human-flow" d="M 205 78 C 270 105, 305 155, 353 218"/>
  <text class="flow-label" x="250" y="119" text-anchor="middle">Enrollment, attendance,</text>
  <text class="flow-label" x="250" y="136" text-anchor="middle">grades, materials</text>

  <path class="human-flow" d="M 755 78 C 690 105, 655 155, 607 218"/>
  <text class="flow-label" x="710" y="119" text-anchor="middle">Grades, attendance,</text>
  <text class="flow-label" x="710" y="136" text-anchor="middle">course materials</text>

  <path class="human-flow" d="M 205 276 L 327 276"/>
  <text class="flow-label" x="267" y="257" text-anchor="middle">Scheduling, reports, users</text>

  <path class="human-flow" d="M 755 276 L 633 276"/>
  <text class="flow-label" x="693" y="257" text-anchor="middle">Billing and payments</text>

  <!-- External systems -->
  <g>
    <rect class="external-box" x="75" y="445" width="220" height="68" rx="8"/>
    <text class="external-title" x="185" y="473" text-anchor="middle">SIS</text>
    <text class="external-subtitle" x="185" y="495" text-anchor="middle">
      Student Information System
    </text>

    <rect class="external-box" x="370" y="445" width="220" height="68" rx="8"/>
    <text class="external-title" x="480" y="473" text-anchor="middle">FMS</text>
    <text class="external-subtitle" x="480" y="495" text-anchor="middle">
      Financial Management System
    </text>

    <rect class="external-box" x="665" y="445" width="220" height="68" rx="8"/>
    <text class="external-title" x="775" y="473" text-anchor="middle">Email Service</text>
    <text class="external-subtitle" x="775" y="495" text-anchor="middle">
      Student notifications
    </text>
  </g>

  <!-- External system interactions -->
  <path class="external-flow" d="M 185 445 C 230 385, 305 355, 383 333"/>
  <text class="flow-label" x="251" y="392" text-anchor="middle">Student master data</text>
  <text class="flow-label" x="251" y="409" text-anchor="middle">REST API</text>

  <path class="external-flow" d="M 480 445 L 480 338"/>
  <text class="flow-label" x="493" y="393">Financial data</text>
  <text class="flow-label" x="493" y="410">REST API</text>

  <path class="external-flow" d="M 775 445 C 730 385, 655 355, 577 333"/>
  <text class="flow-label" x="709" y="392" text-anchor="middle">Notifications</text>
  <text class="flow-label" x="709" y="409" text-anchor="middle">Email API / SMTP</text>

  <!-- Legend -->
  <g>
    <rect x="293" y="566" width="14" height="14" rx="2" fill="#1d9e75"/>
    <text class="legend" x="316" y="578">Human actor</text>
    <rect x="454" y="566" width="14" height="14" rx="2" fill="#3c3489"/>
    <text class="legend" x="477" y="578">UMS</text>
    <rect x="553" y="566" width="14" height="14" rx="2" fill="#ba7517"/>
    <text class="legend" x="576" y="578">External system</text>
  </g>
</svg>
